<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Cellars | Burdett, NY – South East Seneca</title>
  <meta name="description" content="Forge Cellars in Burdett, NY — world-class Dry Riesling, Pinot Noir, Chardonnay and Cabernet Franc from 16 vineyard sites along southeast Seneca Lake. Walk-in welcome in The Salon, Wednesday through Sunday. Reserve the Summer House for a 90-minute guided cellar tasting, Wednesday through Saturday. Franco-American winemaking partnership." />
  <meta property="og:image" content="https://raw.githubusercontent.com/southeastseneca/Forge-Cellars-Listing/main/Hero.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Epilogue:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#323d41;--amber:#eeaf70;--slate:#4e6d77;--mauve:#b37565;--white:#ffffff;--cream:#f7f4f0;--ink:#1e2729;--muted:#6b7c80;--border:#dde4e6;--font-head:'Oswald',sans-serif;--font-body:'Epilogue',sans-serif;--max-width:1100px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--cream);color:var(--ink);line-height:1.7;}
    .ses-icon{display:inline-flex;align-items:center;justify-content:center;background:var(--amber);border-radius:50%;flex-shrink:0;}
    .ses-icon svg{display:block;} .ses-icon-sm{width:28px;height:28px;} .ses-icon-sm svg{width:15px;height:15px;} .ses-icon-md{width:38px;height:38px;} .ses-icon-md svg{width:20px;height:20px;}
    .hero{position:relative;height:560px;background:var(--navy) center/cover no-repeat;background-image:url('Hero.jpeg');background-position:center 35%;display:flex;align-items:flex-end;}
    .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(50,61,65,0.92) 0%,rgba(50,61,65,0.2) 55%,transparent 100%);}
    .hero-content{position:relative;z-index:1;max-width:var(--max-width);margin:0 auto;padding:0 2rem 2.75rem;width:100%;}
    .category-tag{display:inline-flex;align-items:center;gap:0.5rem;background:var(--amber);color:var(--navy);font-family:var(--font-head);font-size:0.7rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:0.3rem 0.85rem 0.3rem 0.5rem;border-radius:2px;margin-bottom:0.65rem;}
    .category-tag .ses-icon{width:22px;height:22px;background:rgba(50,61,65,0.15);} .category-tag .ses-icon svg{width:12px;height:12px;}
    .hero h1{font-family:var(--font-head);font-size:clamp(2.2rem,5vw,3.4rem);font-weight:700;color:var(--white);line-height:1.05;letter-spacing:0.02em;text-transform:uppercase;}
    .hero-tagline{color:rgba(255,255,255,0.82);font-size:1rem;font-weight:300;font-style:italic;margin-top:0.45rem;}
    .quick-bar{background:var(--navy);border-top:3px solid var(--amber);}
    .quick-bar-inner{max-width:var(--max-width);margin:0 auto;padding:0 2rem;display:flex;flex-wrap:wrap;}
    .quick-item{display:flex;align-items:center;gap:0.6rem;padding:0.9rem 1.5rem 0.9rem 0;margin-right:1.5rem;font-size:0.85rem;color:rgba(255,255,255,0.9);border-right:1px solid rgba(255,255,255,0.12);}
    .quick-item:last-child{border-right:none;} .quick-item strong{font-weight:600;color:var(--white);}
    .main-wrapper{max-width:var(--max-width);margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:1fr 320px;gap:3rem;align-items:start;}
    section{margin-bottom:2.75rem;}
    .section-label{font-family:var(--font-head);font-size:0.68rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--slate);margin-bottom:0.35rem;display:flex;align-items:center;gap:0.4rem;}
    .section-label::after{content:'';display:inline-block;width:24px;height:1px;background:var(--slate);opacity:0.5;}
    .section-title{font-family:var(--font-head);font-size:1.75rem;font-weight:600;color:var(--navy);margin-bottom:0.85rem;letter-spacing:0.02em;text-transform:uppercase;border-bottom:2px solid var(--amber);padding-bottom:0.5rem;display:inline-block;}
    p{margin-bottom:1rem;color:#3a4f54;font-size:0.95rem;}
    .story-section{background:var(--navy);border-radius:8px;padding:2rem 2.25rem;margin-bottom:2.75rem;position:relative;overflow:hidden;}
    .story-section::before{content:'\201C';position:absolute;top:0.5rem;right:1.5rem;font-size:7rem;color:rgba(238,175,112,0.1);line-height:1;font-family:Georgia,serif;pointer-events:none;}
    .story-label{font-family:var(--font-head);font-size:0.68rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--amber);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.6rem;}
    .story-title{font-family:var(--font-head);font-size:1.4rem;font-weight:600;color:var(--white);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:1.1rem;}
    .story-body{font-size:0.97rem;font-style:italic;font-weight:300;line-height:1.85;border-left:3px solid var(--amber);padding-left:1.25rem;}
    .story-body p{color:rgba(255,255,255,0.82);margin-bottom:0.85rem;} .story-body p:last-child{margin-bottom:0;}
    .story-attribution{margin-top:1.1rem;padding-top:0.85rem;border-top:1px solid rgba(255,255,255,0.1);font-size:0.82rem;color:var(--amber);font-weight:500;font-style:normal;display:flex;align-items:center;gap:0.6rem;}
    .highlights{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1rem;margin-top:0.85rem;}
    .highlight-card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--amber);padding:1.1rem 1.15rem;border-radius:4px;}
    .highlight-card h4{font-family:var(--font-head);font-size:0.88rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin:0.65rem 0 0.3rem;color:var(--navy);}
    .highlight-card p{font-size:0.82rem;color:var(--muted);margin:0;}
    .wine-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem;}
    .wine-list li{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--slate);padding:0.7rem 1rem;border-radius:3px;font-size:0.88rem;}
    .wine-list li strong{display:block;color:var(--navy);font-family:var(--font-head);letter-spacing:0.03em;font-size:0.92rem;margin-bottom:0.1rem;}
    .wine-list li span{color:var(--muted);font-size:0.8rem;}
    .tasting-options{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:0.85rem;}
    .tasting-card{border-radius:6px;padding:1.5rem;overflow:hidden;}
    .tasting-card-walk{background:var(--cream);border:2px solid var(--amber);}
    .tasting-card-res{background:var(--navy);}
    .tasting-card h4{font-family:var(--font-head);font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.5rem;}
    .tasting-card-walk h4{color:var(--navy);}
    .tasting-card-res h4{color:var(--amber);}
    .tasting-card p{font-size:0.85rem;margin-bottom:0.75rem;line-height:1.7;}
    .tasting-card-walk p{color:#3a4f54;}
    .tasting-card-res p{color:rgba(255,255,255,0.75);}
    .tasting-card .price{font-family:var(--font-head);font-size:1rem;font-weight:700;}
    .tasting-card-walk .price{color:var(--navy);}
    .tasting-card-res .price{color:var(--amber);}
    .note-badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(238,175,112,0.12);border:1px solid rgba(238,175,112,0.4);color:#7a5a30;font-size:0.78rem;padding:0.35rem 0.7rem;border-radius:3px;margin-top:0.75rem;}
    .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-top:0.75rem;}
    .gallery-item{overflow:hidden;border-radius:4px;}
    .gallery-item img{width:100%;height:165px;object-fit:cover;display:block;transition:transform 0.3s ease;}
    .gallery-item:hover img{transform:scale(1.04);}
    .tips-list{list-style:none;margin-top:0.75rem;}
    .tips-list li{display:flex;gap:0.75rem;margin-bottom:0.7rem;font-size:0.92rem;color:#3a4f54;align-items:flex-start;}
    .sidebar{position:sticky;top:2rem;}
    .sidebar-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1.5rem;box-shadow:0 1px 4px rgba(50,61,65,0.07);}
    .sidebar-card-header{background:var(--navy);color:var(--white);padding:0.75rem 1.15rem;font-family:var(--font-head);font-size:0.75rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:0.6rem;}
    .sidebar-card-body{padding:1.15rem;}
    .info-row{display:flex;gap:0.65rem;margin-bottom:0.9rem;font-size:0.88rem;align-items:flex-start;} .info-row:last-child{margin-bottom:0;}
    .info-row .label{font-family:var(--font-head);font-weight:600;display:block;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.15rem;}
    .info-row a{color:var(--slate);text-decoration:none;font-weight:500;}
    .divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
    .hours-sub-head{font-family:var(--font-head);font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin:0.85rem 0 0.4rem;display:block;}
    .hours-table{width:100%;font-size:0.83rem;border-collapse:collapse;}
    .hours-table tr td{padding:0.3rem 0;} .hours-table tr td:first-child{color:var(--muted);}
    .hours-table tr td:last-child{text-align:right;font-weight:600;color:var(--navy);}
    .hours-table .closed{color:var(--muted);font-style:italic;font-weight:400;}
    .cta-btn{display:flex;align-items:center;justify-content:center;gap:0.6rem;background:var(--amber);color:var(--navy);font-family:var(--font-head);font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.8rem 1rem;border-radius:4px;text-decoration:none;margin-top:1rem;transition:background 0.2s;}
    .cta-btn:hover{background:#e09e58;}
    .social-links{display:flex;gap:0.5rem;margin-top:0.75rem;}
    .social-links a{flex:1;text-align:center;background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:0.5rem;font-family:var(--font-head);font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;color:var(--navy);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
    .social-links a:hover{background:var(--border);}
    .map-wrap iframe{width:100%;height:185px;border:none;display:block;}
    .map-note{padding:0.7rem 1.15rem;font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem;}
    .nearby-item{display:flex;gap:0.75rem;margin-bottom:0.8rem;align-items:flex-start;} .nearby-item:last-child{margin-bottom:0;}
    .nearby-item
